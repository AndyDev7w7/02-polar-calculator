<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Polar Calculator</title>
  <link rel="stylesheet" href="./src/styles.css">
</head>
<body>
  <main class="calculator-shell">
    <section class="intro">
      <p class="eyebrow">Polar core</p>
      <h1>Clean arithmetic for cold heads.</h1>
      <p>Basic operations, clear errors, and a tidy history trail.</p>
    </section>
    <section class="calculator" aria-label="Calculator">
      <output id="display" class="display">0</output>
      <div class="keys">
        <button data-action="clear">C</button>
        <button data-action="backspace">⌫</button>
        <button data-operator="/">÷</button>
        <button data-operator="*">×</button>
        <button data-number="7">7</button>
        <button data-number="8">8</button>
        <button data-number="9">9</button>
        <button data-operator="-">−</button>
        <button data-number="4">4</button>
        <button data-number="5">5</button>
        <button data-number="6">6</button>
        <button data-operator="+">+</button>
        <button data-number="1">1</button>
        <button data-number="2">2</button>
        <button data-number="3">3</button>
        <button class="equals" data-action="equals">=</button>
        <button class="zero" data-number="0">0</button>
        <button data-number=".">.</button>
      </div>
    </section>
    <aside class="history">
      <div class="history-head">
        <h2>History</h2>
        <button id="clearHistory">Clear</button>
      </div>
      <ul id="historyList"></ul>
    </aside>
  </main>
  <script type="module" src="./src/app.js"></script>
</body>
</html>
